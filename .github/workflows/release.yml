name: release

# Publish the public packages to npmjs via OIDC TRUSTED PUBLISHING — no
# NPM_TOKEN stored anywhere. GitHub mints a short-lived OIDC token (id-token:
# write) that npm exchanges for publish credentials, and attaches provenance.
#
# Prerequisites (one-time, per package — guard, middleware, proxy — on npmjs.com):
#   1. The package must already exist. npm has no first-publish-via-OIDC
#      (npm/cli#8544), so v0.0.1 is published locally by hand first.
#   2. Package settings -> Trusted Publisher -> GitHub Actions:
#        organization/user = theMobiusStrip
#        repository        = agentpay-guard
#        workflow filename = release.yml
# OIDC publishing requires npm >= 11.5.1 (node 22 ships npm 10, so we upgrade
# npm below) and node >= 22.14.
#
# Release: bump both package versions, then push a matching tag (e.g. v0.1.0).
# The workflow verifies the tag equals both package.json versions and fails fast
# otherwise, so the tag and the published version can never diverge.
#
# SQLite ships inside agentpay-guard on the normal `v*` cadence.
# agentpay-proxy releases on its own cadence through `proxy-v*`.
on:
  push:
    tags:
      - "v*"
      - "proxy-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Version guard: a v* tag MUST equal both lockstep package.json versions;
      # a proxy-v* tag MUST equal the proxy's. Fails fast — before the build
      # gate — if you tagged without bumping, so the tag and the published
      # version can never diverge.
      - name: Verify tag matches package versions
        if: github.ref_type == 'tag'
        run: |
          case "$GITHUB_REF_NAME" in
            proxy-v*)
              TAG="${GITHUB_REF_NAME#proxy-v}"
              V="$(node -p "require('./packages/agentpay-proxy/package.json').version")"
              [ "$V" = "$TAG" ] || { echo "::error::tag proxy-v$TAG != agentpay-proxy@$V — bump package.json to match the tag"; exit 1; }
              echo "tag proxy-v$TAG matches agentpay-proxy ($TAG)"
              ;;
            *)
              TAG="${GITHUB_REF_NAME#v}"
              for pkg in packages/agentpay-guard packages/x402-idempotency-middleware; do
                V="$(node -p "require('./$pkg/package.json').version")"
                [ "$V" = "$TAG" ] || { echo "::error::tag v$TAG != $pkg@$V — bump package.json to match the tag"; exit 1; }
              done
              echo "tag v$TAG matches both packages ($TAG)"
              ;;
          esac
      # OIDC trusted publishing needs npm >= 11.5.1; node 22 ships npm 10.
      - run: npm install -g npm@latest
      - run: npm ci
      # Release gate: never publish a tree that does not build/lint/test green.
      - run: npm run build
      - run: npx tsc -b
      - run: npm run lint
      - run: npx vitest run
      # Publish BY NAME (never --workspaces: that would also target private
      # workspaces if their `private` flag ever regressed). proxy-v* tags
      # publish only the proxy; v* tags (and workflow_dispatch) publish the
      # lockstep pair. No NODE_AUTH_TOKEN: npm authenticates via OIDC against
      # the trusted publisher configured on npmjs.com, and --provenance is
      # attested from it.
      - name: Publish
        run: |
          case "$GITHUB_REF_NAME" in
            proxy-v*)
              npm publish --provenance --access public -w packages/agentpay-proxy
              ;;
            *)
              npm publish --provenance --access public -w packages/agentpay-guard -w packages/x402-idempotency-middleware
              ;;
          esac
