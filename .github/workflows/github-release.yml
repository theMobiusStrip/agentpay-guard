name: github-release

# Manually cut a GitHub Release (the notes / release page) for an EXISTING git
# tag. Deliberately SEPARATE from release.yml (npm publish, auto on a v* tag):
# this workflow is manual-only (workflow_dispatch) and never publishes to npm,
# so running or merging it cannot trigger a package release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to cut a GitHub Release for (e.g. v0.0.2)"
        required: true
        type: string
      prerelease:
        description: "Mark as a pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Cut GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::release $TAG already exists — nothing to do"
            exit 0
          fi
          FLAG="--latest"
          [ "$PRERELEASE" = "true" ] && FLAG="--prerelease"
          # --verify-tag aborts if the tag was never pushed; --generate-notes
          # builds notes from merged PRs since the previous release.
          gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag $FLAG
          echo "created GitHub Release $TAG"
